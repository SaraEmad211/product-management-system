<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<div class="crud">
<div class="head">
<h2> CRUDS  </h2>  
<p >PRODUCT MANAGEMENT SYSTEM</p> 
</div>
<div class="inputs">
    <input  placeholder="title" type="text" id="title">
<div class="price">
    <input  onkeyup="gettotal()"type="number" id="price" placeholder="price">
    <input onkeyup="gettotal()"type="number" id="taxes" placeholder="taxes">
    <input onkeyup="gettotal()"type="number" id="ads" placeholder="ads">
    <input onkeyup="gettotal()"type="number" id="discount" placeholder="discount">
     <small id="total"> </small>

</div>
<input  placeholder="count" type="number" id="count">
<input  placeholder="category" type="text" id="category" >
<button id="submit">  Create  </button>
</div>
<div class="outputs">
    <div class="search">
        <input onkeyup="SearchData(this.value)"  type="text" id="search" placeholder="Search">
        <div class="btnsearch">
            <button onclick="get_searchmode(this.id)" id="searchtitle"> Search By Title</button>
             <button  onclick="get_searchmode(this.id)" id="searchcategory"> Search By Category</button>
        </div>
    </div>
<div id="deleteall">
  
</div>
<table>
    <tr>
        <th>id</th>
        <th>title</th>
      <th>price</th>
      <th>taxes</th>
      <th>ads</th>
      <th>discount</th>
      <th>category</th>
      <th>update</th>

    </tr>
 <tbody id="tbody">

</tbody>
</table>

</div>


</div>
